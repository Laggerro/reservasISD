<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Equipos - Ingreso</title>
   <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border border-gray-100">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
            <span class="material-symbols-outlined text-3xl">school</span>
        </div>

        <h1 class="text-2xl font-black text-gray-800 tracking-tight">Sistema de Reservas</h1>
        <p class="text-sm text-gray-500 mt-1 mb-6">Acceso exclusivo para el personal del colegio</p>

        <div id="mensaje-error" class="hidden bg-red-50 text-red-700 text-xs font-semibold p-3 rounded-xl mb-4 border border-red-200 text-left">
        </div>

        <button id="btn-login" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 border border-gray-300 rounded-xl shadow-sm flex items-center justify-center gap-3 transition-all cursor-pointer active:scale-98">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12 5.04c1.65 0 3.13.57 4.3 1.69l3.22-3.22C17.56 1.63 14.99 1 12 1 7.35 1 3.39 3.65 1.43 7.51l3.79 2.94C6.12 7.02 8.82 5.04 12 5.04z"/>
                <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.46c-.29 1.48-1.14 2.73-2.4 3.58l3.73 2.89c2.18-2.01 3.7-4.99 3.7-8.62z"/>
                <path fill="#FBBC05" d="M5.22 14.73c-.23-.69-.36-1.42-.36-2.18s.13-1.49.36-2.18L1.43 7.51C.52 9.31 0 11.31 0 13.4s.52 4.09 1.43 5.89l3.79-2.94z"/>
                <path fill="#34A353" d="M12 23c3.24 0 5.97-1.07 7.96-2.92l-3.73-2.89c-1.04.7-2.37 1.12-4.23 1.12-3.18 0-5.88-1.98-6.78-5.41l-3.79 2.94C3.39 20.35 7.35 23 12 23z"/>
            </svg>
            Ingresar con Correo Institucional
        </button>

        <p class="text-[10px] text-gray-400 mt-6 uppercase tracking-wider font-semibold">Área de Tecnología Educativa</p>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
