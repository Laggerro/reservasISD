name: Enviar Reporte de Reservas Diario

on:
  # 1. Permite ejecutarlo manualmente desde la web de GitHub
  workflow_dispatch:

  # 2. Se ejecuta a las 10:30 UTC todos los días (Equivale a las 07:30 AM en Argentina)
  schedule:
    - cron: '30 10 * * *'

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        run: |
          npm init -y
          npm install firebase-admin resend

      - name: Ejecutar script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: node enviar-resumen.js