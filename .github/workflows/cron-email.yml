name: Enviar Reporte Diario de Reservas

on:
  schedule:
    # Corre automáticamente de lunes a viernes a las 07:00 AM hora de Argentina (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Permite ejecutar el flujo manualmente desde la pestaña Actions

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Node.js (Forzando la versión recomendada)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar las dependencias de Firebase Admin y Nodemailer
      - name: Install dependencies
        run: |
          npm install firebase-admin nodemailer

      # 4. Ejecutar el script cargando de forma segura las variables de entorno
      - name: Run script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: node enviar-resumen.js