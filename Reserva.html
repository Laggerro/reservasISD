<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas - Colegio</title>
    <!-- Tailwind CSS para diseño rápido y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FullCalendar CSS y JS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/es.global.min.js"></script>
    <!-- Firebase SDK (Versión de compatibilidad para scripts simples) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- PANTALLA 1: LOGIN (Centrada y limpia para profesores veteranos) -->
    <div id="pantalla-login" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center border border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Reserva de Equipos</h1>
            <p class="text-sm text-gray-500 mb-6">Ingresá con tu cuenta institucional para gestionar tus mapas y proyectores.</p>
            
            <!-- Botón Gigante de Login -->
            <button onclick="iniciarSesionConGoogle()" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 border border-gray-300 rounded-xl shadow-sm transition-all active:scale-95">
               <!-- <img src="https://www.gstatic.com/images/branding/product/1x/gsa_64dp.png" class="w-6 h-6" alt="Google"> -->
                <img src="https://cloudflare.com" class="w-6 h-6" alt="Google">
                <span>Acceder con Google .edu</span>
            </button>
        </div>
    </div>

    <!-- PANTALLA 2: SISTEMA PRINCIPAL (Oculta por defecto) -->
    <div id="pantalla-sistema" class="hidden flex-grow flex flex-col">
        <!-- Barra de Navegación -->
        <nav class="bg-blue-600 text-white px-4 py-3 flex justify-between items-center shadow-md">
            <div>
                <span id="nombre-profesor" class="font-medium text-sm block">Cargando...</span>
                <span class="text-xs opacity-80">Panel de Profesores</span>
            </div>
            <div class="flex gap-2">
                <!-- Botón Admin Oculto por defecto -->
                <button id="menu-admin" class="hidden bg-yellow-500 hover:bg-yellow-600 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors">
                    ⚙️ Ajustes
                </button>
                <button onclick="cerrarSesion()" class="bg-red-500 hover:bg-red-600 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors">
                    Salir
                </button>
            </div>
        </nav>

        <!-- Contenido Principal Adaptable -->
        <main class="p-4 lg:p-6 max-w-6xl mx-full w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
            <!-- Columna Izquierda: Selector de Equipos -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-1">
                <h2 class="text-lg font-bold text-gray-800 mb-3">1. Seleccioná el Equipo</h2>
                <div id="lista-inventario" class="space-y-3">
                    <!-- Ejemplo de tarjeta de equipo grande para celular -->
                    <div class="border-2 border-blue-500 bg-blue-50 p-4 rounded-xl cursor-pointer transition-all active:scale-98">
                        <p class="font-bold text-gray-800">Mapa Físico de Europa</p>
                        <p class="text-xs text-blue-600 font-semibold mt-1">Disponibles: 3 unidades</p>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Calendario Dinámico -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-2 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-3">2. Seleccioná la Fecha</h2>
                <div id="calendario-contenedor" class="flex-grow min-h-[350px]">
                    <!-- Aquí se renderiza FullCalendar automáticamente -->
                    <div id="calendar"></div>
                </div>
            </div>
        </main>
    </div>


<script src=index.js></script>
</body>
</html>
